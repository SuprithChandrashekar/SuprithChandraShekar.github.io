<footer class="mt-auto site-footer">
  <div class="container">
    <div class="row justify-content-between align-items-start">

      <!-- Brand + Tagline -->
      <div class="col-md-4 mb-3 mb-md-0">
        <div class="footer-brand">{{ site.author.name }}</div>
        <p class="footer-tagline">{{ site.description }}</p>
      </div>

      <!-- Social Links -->
      <div class="col-md-4 text-md-right text-center">
        {% if site.author.github %}
          <a href="https://github.com/{{ site.author.github }}" class="footer-social-link" target="_blank" title="GitHub">
            <i class="fab fa-github"></i>
          </a>
        {% endif %}
        {% if site.author.linkedin %}
          <a href="{{ site.author.linkedin }}" class="footer-social-link" target="_blank" title="LinkedIn">
            <i class="fab fa-linkedin-in"></i>
          </a>
        {% endif %}
        {% if site.author.email %}
          <a href="mailto:{{ site.author.email }}" class="footer-social-link" title="Email">
            <i class="fas fa-envelope"></i>
          </a>
        {% endif %}
      </div>

    </div>

    <!-- Copyright -->
    <div class="text-center footer-copyright">
      <i class="fas fa-code"></i> with <i class="fas fa-heart heart-icon"></i>
      by <strong>{{ site.author.name }}</strong>
    </div>
  </div>
</footer>

{% if page.custom_js %}
  {% for js_file in page.custom_js %}
    <script src='{{ site.baseurl }}/assets/js/{{ js_file }}.js' type="text/javascript"></script>
  {% endfor %}
{% endif %}
