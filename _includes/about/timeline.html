<div class="col mt-4">
  <h2 class="mb-4 gradient-text">Experience & Education</h2>
  <div class="timeline-body">
    {% for item in site.data.timeline %}
      <div class="timeline-item wow animated fadeInLeft" data-wow-delay="{{ forloop.index | times: 0.1 }}s">
        <div class="content">
          <h2>{{ item.title }}</h2>
          <span class="date">{{ item.from }} — {{ item.to }}</span>
          <p>{{ item.description }}</p>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
