<!-- Skills Section — Radial ring display -->
<div class="col-lg">

  <h2 class="mb-4 gradient-text">{{ include.title }}</h2>

  <div class="row">
    {% for skill in include.source %}
    <div class="col-6 col-md-4 col-lg-3 mb-4">
      <div class="skill-card text-center p-3 wow animated fadeInUp" data-wow-delay="{{ forloop.index | times: 0.05 }}s">

        <!-- SVG Radial Ring -->
        <div class="skill-ring-wrapper mb-2">
          <svg class="skill-ring" viewBox="0 0 80 80" width="72" height="72">
            <circle class="skill-ring-bg" cx="40" cy="40" r="34" fill="none" stroke-width="5"/>
            <circle class="skill-ring-fill wow animated"
                    cx="40" cy="40" r="34" fill="none"
                    stroke-width="5"
                    stroke-linecap="round"
                    stroke-dasharray="{{ skill.percentage | times: 2.136 }} 213.6"
                    stroke-dashoffset="0"
                    transform="rotate(-90 40 40)"
                    data-wow-delay="{{ forloop.index | times: 0.08 }}s"/>
          </svg>
          <span class="skill-percentage">{{ skill.percentage }}%</span>
        </div>

        <p class="skill-name mb-0">{{ skill.name }}</p>
        <small class="skill-level text-muted">{{ skill.level }}</small>
      </div>
    </div>
    {% endfor %}
  </div>

</div>
